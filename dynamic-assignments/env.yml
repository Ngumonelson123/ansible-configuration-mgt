---
# Dynamic assignment — loads env-specific vars at runtime
# Referenced in site.yml via include_vars

- name: Looping through all files in env-vars folder
  include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ inventory_file | basename }}.yml"
        - default.yml
      paths:
        - "{{ playbook_dir }}/../env-vars"
  tags:
    - always
