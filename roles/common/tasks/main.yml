---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install common packages
  apt:
    name:
      - curl
      - wget
      - unzip
      - git
      - vim
      - net-tools
      - python3
      - python3-pip
    state: present

- name: Set timezone to UTC
  timezone:
    name: UTC

- name: Ensure /etc/hosts has hostname entry
  lineinfile:
    path: /etc/hosts
    line: "127.0.0.1 {{ ansible_facts['hostname'] }}"
    state: present