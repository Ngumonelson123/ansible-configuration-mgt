---
- name: Grant ubuntu ownership for composer install
  file:
    path: /var/www/html/tooling
    owner: ubuntu
    group: ubuntu
    recurse: yes
  become: true

- name: Install required PHP and system packages
  apt:
    name:
      - php
      - php-cli
      - php-mbstring
      - php-xml
      - php-zip
      - php-curl
      - unzip
      - curl
    state: present
    update_cache: yes
  become: true

- name: Download Composer installer
  get_url:
    url: https://getcomposer.org/installer
    dest: /tmp/composer-installer.php
    mode: "0755"
  become: true

- name: Install Composer globally
  command: php /tmp/composer-installer.php --install-dir=/usr/local/bin --filename=composer
  args:
    creates: /usr/local/bin/composer   # skips if composer already exists
  become: true

- name: Run composer install
  composer:
    command: install
    working_dir: /var/www/html/tooling
    no_dev: false
  become: true
  become_user: ubuntu
  environment:
    HOME: /home/ubuntu
    COMPOSER_ALLOW_SUPERUSER: "0"

- name: Restore correct ownership for Apache
  file:
    path: /var/www/html/tooling
    owner: www-data
    group: www-data
    recurse: yes
    mode: "0755"
  become: true