---
- name: Clone Tooling repository
  git:
    repo: "https://github.com/Ngumonelson123/tooling.git"
    dest: /var/www/html/tooling
    version: main
  become: true

- name: Set correct ownership for Apache
  file:
    path: /var/www/html/tooling
    owner: www-data
    group: www-data
    recurse: yes
    mode: "0755"
  become: true

- name: Deploy Apache virtual host config for tooling
  copy:
    dest: /etc/apache2/sites-available/tooling.conf
    content: |
      <VirtualHost *:80>
          ServerAdmin webmaster@localhost
          DocumentRoot /var/www/html/tooling/html

          <Directory /var/www/html/tooling/html>
              Options Indexes FollowSymLinks
              AllowOverride All
              Require all granted
          </Directory>

          ErrorLog ${APACHE_LOG_DIR}/tooling-error.log
          CustomLog ${APACHE_LOG_DIR}/tooling-access.log combined
      </VirtualHost>
  become: true
  notify: Restart Apache

- name: Enable tooling site
  command: a2ensite tooling.conf
  become: true
  notify: Restart Apache

- name: Disable default Apache site
  command: a2dissite 000-default.conf
  become: true
  notify: Restart Apache

- name: Enable Apache rewrite module
  command: a2enmod rewrite
  become: true
  notify: Restart Apache