---
- name: Grant ubuntu ownership for composer install
  file:
    path: /var/www/html/todo
    owner: ubuntu
    group: ubuntu
    recurse: yes
  become: true

- name: Update .env DB settings
  lineinfile:
    path: /var/www/html/todo/.env
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - { regexp: '^DB_HOST=', line: 'DB_HOST=10.0.1.219' }
    - { regexp: '^DB_DATABASE=', line: 'DB_DATABASE=homestead' }
    - { regexp: '^DB_USERNAME=', line: 'DB_USERNAME=homestead' }
    - { regexp: '^DB_PASSWORD=', line: 'DB_PASSWORD=sePret^i' }
  become: true

- name: Run composer install
  composer:
    command: install
    working_dir: /var/www/html/todo
    no_dev: false
  become: true
  become_user: ubuntu
  environment:
    HOME: /home/ubuntu
    COMPOSER_ALLOW_SUPERUSER: "0"

- name: Restore correct ownership for Apache
  file:
    path: /var/www/html/todo
    owner: www-data
    group: www-data
    recurse: yes
    mode: "0755"
  become: true