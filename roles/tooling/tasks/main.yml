---
- name: Grant ubuntu ownership for composer install
  file:
    path: /var/www/html/tooling
    owner: ubuntu
    group: ubuntu
    recurse: yes
  become: true

- name: Run composer install
  composer:
    command: install
    working_dir: /var/www/html/tooling
    no_dev: false
  become: true
  become_user: ubuntu
  environment:
    HOME: /home/ubuntu
    COMPOSER_ALLOW_SUPERUSER: "0"

- name: Restore correct ownership for Apache
  file:
    path: /var/www/html/tooling
    owner: www-data
    group: www-data
    recurse: yes
    mode: "0755"
  become: true