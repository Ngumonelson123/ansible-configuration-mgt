---
- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Deploy Nginx reverse proxy config for CI environment
  template:
    src: nginx-ci.conf.j2
    dest: /etc/nginx/sites-available/ci.conf
    mode: "0644"
  notify: Reload Nginx

- name: Enable CI nginx config
  file:
    src: /etc/nginx/sites-available/ci.conf
    dest: /etc/nginx/sites-enabled/ci.conf
    state: link
  notify: Reload Nginx

- name: Start and enable Nginx
  systemd:
    name: nginx
    state: started
    enabled: yes
