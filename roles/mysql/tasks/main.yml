---
- name: Install MySQL server
  apt:
    name:
      - mysql-server
      - mysql-client
      - python3-pymysql
    state: present
    update_cache: yes

- name: Start and enable MySQL
  systemd:
    name: mysql
    state: started
    enabled: yes

- name: Set MySQL root password using socket auth
  community.mysql.mysql_user:
    name: root
    password: "{{ mysql_root_password }}"
    login_unix_socket: /var/run/mysqld/mysqld.sock
    host_all: yes
    state: present

- name: Create .my.cnf for root user
  copy:
    dest: /root/.my.cnf
    content: |
      [client]
      user=root
      password={{ mysql_root_password }}
    mode: "0600"

- name: Create homestead database
  community.mysql.mysql_db:
    name: "{{ mysql_homestead_db }}"
    state: present
    login_user: root
    login_password: "{{ mysql_root_password }}"

- name: Create homestead user with remote access
  community.mysql.mysql_user:
    name: "{{ mysql_homestead_user }}"
    password: "{{ mysql_homestead_password }}"
    priv: "{{ mysql_homestead_db }}.*:ALL"
    host: "%"
    login_user: root
    login_password: "{{ mysql_root_password }}"
    state: present

- name: Allow MySQL to listen on all interfaces
  lineinfile:
    path: /etc/mysql/mysql.conf.d/mysqld.cnf
    regexp: "^bind-address"
    line: "bind-address = 0.0.0.0"
  notify: Restart MySQL
